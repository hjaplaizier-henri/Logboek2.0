<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Log">
<meta name="theme-color" content="#1B2A4A">
<title>Gym Logboek</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --teal: #1A7A6E; --teal-l: #d1ece9;
  --red: #B03A2E; --red-l: #fadbd8;
  --purple: #6C3483; --purple-l: #ead9f5;
  --green: #1E6B3C; --green-l: #d5f0e3;
  --orange: #C0692A; --orange-l: #fde8d8;
  --blue: #1A5276; --blue-l: #d6eaf8;
  --navy: #1B2A4A; --grey: #f2f4f7; --border: #dde3ea;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: var(--grey); color: #1a1a2e; min-height: 100vh; }

/* Header */
.app-header { background: var(--navy); color: white; padding: 16px 20px 12px;
              position: sticky; top: 0; z-index: 100;
              box-shadow: 0 2px 12px rgba(0,0,0,0.25); }
.header-top { display: flex; justify-content: space-between; align-items: center; }
.app-header h1 { font-size: 18px; font-weight: 700; }
.header-btns { display: flex; gap: 8px; }
.header-btn { background: rgba(255,255,255,0.15); border: none; color: white;
              padding: 6px 12px; border-radius: 20px; font-size: 12px;
              font-weight: 600; cursor: pointer; }
.week-label { font-size: 12px; opacity: .7; margin-top: 4px; }

/* Tab bar */
.tab-bar { display: flex; background: white; border-bottom: 2px solid var(--border);
           overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab { flex: 1; min-width: 60px; padding: 10px 4px 8px; text-align: center;
       font-size: 11px; font-weight: 600; color: #888; cursor: pointer;
       border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; }
.tab.active { color: var(--navy); border-bottom-color: var(--navy); }
.tab .tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }
.tab .tab-date { font-weight: 400; font-size: 10px; opacity: .7; }

/* Views */
.day-view { display: none; padding: 14px 14px 100px; }
.day-view.active { display: block; }

.day-banner { border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; color: white;
              display: flex; justify-content: space-between; align-items: flex-start; }
.day-banner h2 { font-size: 17px; font-weight: 700; }
.day-banner p { font-size: 12px; opacity: .85; margin-top: 3px; }
.banner-edit { background: rgba(255,255,255,0.2); border: none; color: white;
               padding: 6px 12px; border-radius: 20px; font-size: 11px;
               font-weight: 600; cursor: pointer; white-space: nowrap; }

/* Exercise card */
.exercise-card { background: white; border-radius: 14px; margin-bottom: 10px;
                 box-shadow: 0 1px 6px rgba(0,0,0,.07); overflow: hidden; }
.exercise-header { padding: 12px 14px 8px; display: flex; justify-content: space-between; align-items: flex-start; }
.exercise-name { font-size: 14px; font-weight: 700; color: var(--navy); }
.exercise-meta { font-size: 11px; color: #888; margin-top: 2px; }
.exercise-tip { font-size: 11px; color: #aaa; font-style: italic; margin-top: 2px; }
.ex-delete { background: none; border: none; color: #ddd; font-size: 18px; cursor: pointer; padding: 0 4px; }

/* Sets table */
.sets-table { width: 100%; border-collapse: collapse; }
.sets-table th { font-size: 10px; font-weight: 600; color: #aaa; text-transform: uppercase;
                 padding: 5px 14px; text-align: left; background: #fafafa;
                 border-top: 1px solid var(--border); }
.sets-table th:last-child { text-align: center; }
.set-row { border-top: 1px solid var(--border); }
.set-row td { padding: 9px 14px; vertical-align: middle; }
.set-num { font-size: 12px; font-weight: 700; color: #bbb; width: 28px; }
.target { font-size: 11px; color: #888; width: 80px; }
.input-group { display: flex; gap: 6px; align-items: center; }
.log-input { width: 54px; padding: 7px 8px; border: 1.5px solid var(--border);
             border-radius: 9px; font-size: 15px; text-align: center;
             font-family: inherit; color: var(--navy); font-weight: 600;
             background: var(--grey); -webkit-appearance: none; }
.log-input:focus { outline: none; border-color: var(--teal); background: white; }
.input-label { font-size: 10px; color: #aaa; }
.done-btn { width: 32px; height: 32px; border-radius: 50%; border: none;
            background: var(--border); color: #aaa; font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .2s; flex-shrink: 0; }
.done-btn.checked { background: var(--teal); color: white; }

/* Progress */
.progress-wrap { padding: 8px 14px 12px; }
.progress-label { font-size: 10px; color: #aaa; margin-bottom: 4px;
                  display: flex; justify-content: space-between; }
.progress-bar { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }

/* Add exercise button */
.add-exercise-btn { width: 100%; padding: 14px; border: 2px dashed var(--border);
                    background: white; border-radius: 14px; font-size: 14px;
                    color: #aaa; cursor: pointer; margin-bottom: 10px;
                    display: flex; align-items: center; justify-content: center; gap: 8px; }

/* Walk / activity card */
.activity-card { background: white; border-radius: 14px; margin-bottom: 10px;
                 box-shadow: 0 1px 6px rgba(0,0,0,.07); padding: 16px; }
.activity-card h3 { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 12px; }
.activity-row { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
.activity-input { flex: 1; min-width: 80px; padding: 10px 12px; border: 1.5px solid var(--border);
                  border-radius: 9px; font-size: 15px; font-family: inherit;
                  color: var(--navy); font-weight: 600; background: var(--grey);
                  -webkit-appearance: none; }
.activity-input:focus { outline: none; border-color: var(--teal); background: white; }
.activity-label { font-size: 12px; color: #888; white-space: nowrap; }
.activity-done { width: 100%; padding: 12px; border: none; border-radius: 10px;
                 font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
.activity-done.unchecked { background: var(--border); color: #888; }
.activity-done.checked { background: var(--teal); color: white; }
.notes-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
               border-radius: 9px; font-size: 14px; font-family: inherit;
               color: var(--navy); background: var(--grey); resize: none; }
.notes-input:focus { outline: none; border-color: var(--teal); background: white; }

/* Extra activities */
.extra-activity { background: white; border-radius: 14px; margin-bottom: 10px;
                  box-shadow: 0 1px 6px rgba(0,0,0,.07); overflow: hidden; }
.extra-header { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; }
.extra-name { font-size: 14px; font-weight: 700; color: var(--navy); }
.extra-body { padding: 0 14px 14px; }

/* Summary */
.summary-card { background: white; border-radius: 14px; padding: 16px;
                margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
.summary-card h3 { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
.summary-row { display: flex; justify-content: space-between; align-items: center;
               padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.summary-row:last-child { border: none; }
.summary-val { font-weight: 700; color: var(--teal); }
.reset-btn { width: 100%; padding: 13px; border: 1.5px solid var(--border);
             background: white; border-radius: 12px; font-size: 13px;
             color: #888; cursor: pointer; margin-top: 6px; }

/* Archive view */
#archiveView { display: none; padding: 14px 14px 100px; }
#archiveView.active { display: block; }
.archive-week { background: white; border-radius: 14px; margin-bottom: 10px;
                box-shadow: 0 1px 6px rgba(0,0,0,.07); overflow: hidden; }
.archive-week-header { padding: 14px 16px; display: flex; justify-content: space-between;
                       align-items: center; cursor: pointer; }
.archive-week-title { font-size: 14px; font-weight: 700; color: var(--navy); }
.archive-week-stats { font-size: 12px; color: #888; }
.archive-week-body { display: none; border-top: 1px solid var(--border); }
.archive-week-body.open { display: block; }
.archive-day { padding: 10px 16px; border-bottom: 1px solid var(--border); }
.archive-day:last-child { border: none; }
.archive-day-name { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.archive-ex { font-size: 11px; color: #666; padding: 2px 0; }
.no-archive { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5);
                 z-index: 200; display: none; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 20px 20px 0 0; width: 100%;
         padding: 20px 20px 40px; max-height: 85vh; overflow-y: auto; }
.modal h3 { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 16px; }
.modal-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
               border-radius: 10px; font-size: 15px; font-family: inherit;
               color: var(--navy); background: var(--grey); margin-bottom: 10px;
               -webkit-appearance: none; }
.modal-input:focus { outline: none; border-color: var(--teal); background: white; }
.modal-row { display: flex; gap: 10px; }
.modal-row .modal-input { flex: 1; }
.modal-btn { width: 100%; padding: 14px; border: none; border-radius: 12px;
             font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
.modal-btn.primary { background: var(--teal); color: white; }
.modal-btn.secondary { background: var(--grey); color: #888; }
.modal-close { position: absolute; top: 16px; right: 20px; background: none;
               border: none; font-size: 22px; color: #aaa; cursor: pointer; }

/* Day editor modal */
.day-editor-item { display: flex; justify-content: space-between; align-items: center;
                   padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.day-editor-item:last-child { border: none; }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
         background: var(--navy); color: white; padding: 11px 20px; border-radius: 99px;
         font-size: 13px; font-weight: 600; opacity: 0; transition: all .3s; z-index: 999;
         white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Color pills */
.color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.color-pill { width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
              border: 3px solid transparent; transition: all .2s; }
.color-pill.selected { border-color: var(--navy); transform: scale(1.15); }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <h1>🏋️ Gym Logboek</h1>
    <div class="header-btns">
      <button class="header-btn" onclick="showArchive()">📦 Archief</button>
      <button class="header-btn" onclick="saveWeekToArchive()">💾 Sla week op</button>
    </div>
  </div>
  <div class="week-label" id="weekLabel"></div>
</div>

<div class="tab-bar" id="tabBar"></div>
<div id="views"></div>
<div id="archiveView">
  <div id="archiveContent"></div>
</div>

<!-- Add Exercise Modal -->
<div class="modal-overlay" id="addExModal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal('addExModal')">✕</button>
    <h3>➕ Oefening toevoegen</h3>
    <input class="modal-input" id="exName" placeholder="Naam (bijv. Bench Press)">
    <input class="modal-input" id="exTip" placeholder="Tip (optioneel)">
    <div class="modal-row">
      <input class="modal-input" id="exSets" type="number" placeholder="Sets" min="1" max="10">
      <input class="modal-input" id="exReps" placeholder="Reps (bijv. 8–10)">
    </div>
    <button class="modal-btn primary" onclick="confirmAddExercise()">Toevoegen</button>
    <button class="modal-btn secondary" onclick="closeModal('addExModal')">Annuleer</button>
  </div>
</div>

<!-- Add Activity Modal -->
<div class="modal-overlay" id="addActivityModal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal('addActivityModal')">✕</button>
    <h3>🏃 Activiteit toevoegen</h3>
    <input class="modal-input" id="actName" placeholder="Naam (bijv. Yoga, Fietsen, Zwemmen)">
    <input class="modal-input" id="actIcon" placeholder="Emoji icoontje (bijv. 🧘)">
    <button class="modal-btn primary" onclick="confirmAddActivity()">Toevoegen</button>
    <button class="modal-btn secondary" onclick="closeModal('addActivityModal')">Annuleer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Week calculation ───────────────────────────────────────────────
function getMonday(d) {
  d = new Date(d);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  d.setHours(0,0,0,0);
  return d;
}
function formatDate(d) {
  return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
}
function weekKey(monday) {
  return `week_${monday.toISOString().slice(0,10)}`;
}

const today = new Date();
const currentMonday = getMonday(today);

function getWeekDates(monday) {
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

const weekDates = getWeekDates(currentMonday);
const WEEK_KEY = weekKey(currentMonday);

document.getElementById('weekLabel').textContent =
  `Week van ${formatDate(weekDates[0])} t/m ${formatDate(weekDates[6])}`;

// ── Default schema ─────────────────────────────────────────────────
const DEFAULT_SCHEMA = [
  {
    id: "ma", label: "Ma", icon: "💪", name: "PUSH",
    focus: "Borst · Schouders · Triceps", color: "#1A7A6E",
    type: "gym",
    exercises: [
      { name: "Bench Press", tip: "Compound basis", sets: 4, reps: "8–10" },
      { name: "Incline Dumbbell Press", tip: "Bovenste borst", sets: 3, reps: "10–12" },
      { name: "Shoulder Press (Machine)", tip: "Schouders", sets: 3, reps: "10–12" },
      { name: "Lateral Raises", tip: "Zijkant schouder", sets: 3, reps: "12–15" },
      { name: "Tricep Pushdown", tip: "Isolatie triceps", sets: 3, reps: "12–15" },
      { name: "Overhead Tricep Ext.", tip: "Lange kop triceps", sets: 2, reps: "12–15" },
    ]
  },
  {
    id: "di", label: "Di", icon: "🦵", name: "BENEN",
    focus: "Quads · Hamstrings · Billen · Kuiten", color: "#B03A2E",
    type: "gym",
    exercises: [
      { name: "Leg Press", tip: "Veel volume", sets: 4, reps: "10–12" },
      { name: "Goblet Squat", tip: "Techniek + quad focus", sets: 3, reps: "12" },
      { name: "Leg Curl (Machine)", tip: "Hamstrings", sets: 3, reps: "10–12" },
      { name: "Romanian Deadlift", tip: "Hamstrings + billen", sets: 3, reps: "10" },
      { name: "Hip Thrust", tip: "Glutes activatie", sets: 3, reps: "12–15" },
      { name: "Calf Raises", tip: "Kuiten", sets: 4, reps: "15–20" },
    ]
  },
  {
    id: "wo", label: "Wo", icon: "🏋️", name: "PULL",
    focus: "Rug · Biceps · Core", color: "#6C3483",
    type: "gym",
    exercises: [
      { name: "Lat Pulldown", tip: "Breedte rug", sets: 4, reps: "8–10" },
      { name: "Seated Cable Row", tip: "Dikte rug", sets: 3, reps: "10–12" },
      { name: "Single-arm DB Row", tip: "Eenzijdige kracht", sets: 3, reps: "10–12" },
      { name: "Face Pulls", tip: "Schouder gezondheid", sets: 3, reps: "15" },
      { name: "Dumbbell Curl", tip: "Biceps", sets: 3, reps: "10–12" },
      { name: "Plank", tip: "Core stabiliteit", sets: 3, reps: "45–60s" },
    ]
  },
  {
    id: "do", label: "Do", icon: "⚡", name: "FULL BODY",
    focus: "Heel lichaam · Licht gewicht · Hoog volume", color: "#1E6B3C",
    type: "gym",
    exercises: [
      { name: "Goblet Squat (licht)", tip: "60–70% gewicht", sets: 3, reps: "15" },
      { name: "Dumbbell Row", tip: "Voel de spier", sets: 3, reps: "15" },
      { name: "DB Shoulder Press", tip: "Controle boven snelheid", sets: 3, reps: "15" },
      { name: "Romanian Deadlift (licht)", tip: "Stretch & activatie", sets: 3, reps: "15" },
      { name: "Cable Fly / Pec Deck", tip: "Borst uitrekken", sets: 3, reps: "15" },
      { name: "Core Circuit", tip: "Plank + crunches", sets: 3, reps: "30s" },
    ]
  },
  {
    id: "vr", label: "Vr", icon: "🧘", name: "EXTRA",
    focus: "Vrije activiteit", color: "#C0692A",
    type: "extra",
    activities: []
  },
  {
    id: "za", label: "Za", icon: "🚶", name: "WANDELING",
    focus: "Weekend activiteit", color: "#1A5276",
    type: "walk"
  },
  {
    id: "zo", label: "Zo", icon: "🚶", name: "WANDELING",
    focus: "Weekend activiteit", color: "#1A5276",
    type: "walk"
  }
];

// ── State ──────────────────────────────────────────────────────────
function loadState() {
  try { return JSON.parse(localStorage.getItem('gymlog_v2') || '{}'); } catch(e) { return {}; }
}
function saveState() {
  try { localStorage.setItem('gymlog_v2', JSON.stringify(state)); } catch(e) {}
}
function loadSchema() {
  try {
    const s = localStorage.getItem('gymlog_schema_v2');
    return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_SCHEMA));
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_SCHEMA)); }
}
function saveSchema() {
  try { localStorage.setItem('gymlog_schema_v2', JSON.stringify(schema)); } catch(e) {}
}
function loadArchive() {
  try { return JSON.parse(localStorage.getItem('gymlog_archive_v2') || '{}'); } catch(e) { return {}; }
}
function saveArchive(data) {
  try { localStorage.setItem('gymlog_archive_v2', JSON.stringify(data)); } catch(e) {}
}

let state = loadState();
let schema = loadSchema();

function getKey(dayId, exIdx, setIdx, field) { return `${WEEK_KEY}_${dayId}_${exIdx}_${setIdx}_${field}`; }
function getDoneKey(dayId, exIdx, setIdx) { return `${WEEK_KEY}_${dayId}_${exIdx}_${setIdx}_done`; }
function getWalkKey(dayId, field) { return `${WEEK_KEY}_${dayId}_walk_${field}`; }
function getActivityKey(dayId, actIdx, field) { return `${WEEK_KEY}_${dayId}_act_${actIdx}_${field}`; }

// ── Build UI ───────────────────────────────────────────────────────
let currentAddDayId = null;
let currentAddType = null;

function buildUI() {
  const tabBar = document.getElementById('tabBar');
  const viewsEl = document.getElementById('views');
  tabBar.innerHTML = '';
  viewsEl.innerHTML = '';

  schema.forEach((day, di) => {
    const date = weekDates[di];

    // Tab
    const tab = document.createElement('div');
    tab.className = 'tab' + (di === 0 ? ' active' : '');
    tab.id = `tab_${di}`;
    tab.innerHTML = `<span class="tab-icon">${day.icon}</span>${day.label}<br><span class="tab-date">${formatDate(date)}</span>`;
    tab.onclick = () => switchTab(di);
    tabBar.appendChild(tab);

    // View
    const view = document.createElement('div');
    view.className = 'day-view' + (di === 0 ? ' active' : '');
    view.id = `view_${day.id}`;

    let html = `<div class="day-banner" style="background:${day.color}">
      <div>
        <h2>${day.icon} ${day.name}</h2>
        <p>${day.focus}</p>
      </div>
    </div>`;

    if (day.type === 'gym') {
      html += buildGymDay(day, di);
    } else if (day.type === 'walk') {
      html += buildWalkDay(day);
    } else if (day.type === 'extra') {
      html += buildExtraDay(day, di);
    }

    // Summary
    if (day.type === 'gym') {
      html += `<div class="summary-card">
        <h3>📊 Dagoverzicht</h3>
        <div id="summary_${day.id}"></div>
      </div>`;
    }

    html += `<button class="reset-btn" onclick="resetDay('${day.id}')">🔄 Dag resetten</button>`;

    view.innerHTML = html;
    viewsEl.appendChild(view);

    if (day.type === 'gym') {
      day.exercises.forEach((ex, ei) => updateProgress(day.id, ei, ex.sets));
      updateSummary(day.id, di);
    }
  });
}

function buildGymDay(day, di) {
  let html = '';
  day.exercises.forEach((ex, ei) => {
    html += `<div class="exercise-card" id="card_${day.id}_${ei}">
      <div class="exercise-header">
        <div>
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-meta">${ex.sets} sets · ${ex.reps} herh.</div>
          ${ex.tip ? `<div class="exercise-tip">💡 ${ex.tip}</div>` : ''}
        </div>
        <button class="ex-delete" onclick="deleteExercise('${day.id}',${ei})">×</button>
      </div>
      <table class="sets-table">
        <tr>
          <th style="width:28px">#</th>
          <th>Doel</th>
          <th>Gewicht (kg)</th>
          <th>Reps</th>
          <th style="text-align:center">✓</th>
        </tr>`;
    for (let si = 0; si < ex.sets; si++) {
      const wVal = state[getKey(day.id, ei, si, 'w')] || '';
      const rVal = state[getKey(day.id, ei, si, 'r')] || '';
      const done = state[getDoneKey(day.id, ei, si)] || false;
      html += `<tr class="set-row" id="setrow_${day.id}_${ei}_${si}">
        <td class="set-num">${si+1}</td>
        <td class="target">${ex.reps}</td>
        <td><div class="input-group">
          <input class="log-input" type="number" inputmode="decimal" placeholder="—"
            value="${wVal}" onchange="logVal('${day.id}',${ei},${si},'w',this.value)" onfocus="this.select()">
          <span class="input-label">kg</span>
        </div></td>
        <td><div class="input-group">
          <input class="log-input" type="number" inputmode="numeric" placeholder="—"
            value="${rVal}" onchange="logVal('${day.id}',${ei},${si},'r',this.value)" onfocus="this.select()">
          <span class="input-label">reps</span>
        </div></td>
        <td style="text-align:center">
          <button class="done-btn ${done?'checked':''}"
            onclick="toggleDone('${day.id}',${ei},${si})"
            id="donebtn_${day.id}_${ei}_${si}">✓</button>
        </td>
      </tr>`;
    }
    html += `</table>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Sets voltooid</span>
          <span id="prog_count_${day.id}_${ei}">0 / ${ex.sets}</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="prog_${day.id}_${ei}" style="background:${day.color};width:0%"></div>
        </div>
      </div>
    </div>`;
  });

  html += `<button class="add-exercise-btn" onclick="openAddExercise('${day.id}')">
    ➕ Oefening toevoegen
  </button>`;
  return html;
}

function buildWalkDay(day) {
  const distVal = state[getWalkKey(day.id, 'dist')] || '';
  const timeVal = state[getWalkKey(day.id, 'time')] || '';
  const notesVal = state[getWalkKey(day.id, 'notes')] || '';
  const done = state[getWalkKey(day.id, 'done')] || false;

  return `<div class="activity-card">
    <h3>🚶 Wandeling loggen</h3>
    <div class="activity-row">
      <div>
        <div class="activity-label" style="margin-bottom:4px">Afstand</div>
        <div class="input-group">
          <input class="activity-input" type="number" inputmode="decimal" placeholder="0.0"
            value="${distVal}" onchange="logWalk('${day.id}','dist',this.value)">
          <span class="activity-label">km</span>
        </div>
      </div>
      <div>
        <div class="activity-label" style="margin-bottom:4px">Tijd</div>
        <div class="input-group">
          <input class="activity-input" type="number" inputmode="numeric" placeholder="0"
            value="${timeVal}" onchange="logWalk('${day.id}','time',this.value)">
          <span class="activity-label">min</span>
        </div>
      </div>
    </div>
    <textarea class="notes-input" rows="2" placeholder="Notities (route, weer, gevoel...)"
      onchange="logWalk('${day.id}','notes',this.value)">${notesVal}</textarea>
    <br><br>
    <button class="activity-done ${done?'checked':'unchecked'}"
      id="walkdone_${day.id}" onclick="toggleWalkDone('${day.id}')">
      ${done ? '✓ Wandeling voltooid!' : 'Markeer als voltooid'}
    </button>
  </div>`;
}

function buildExtraDay(day, di) {
  let html = '';

  // Existing activities
  (day.activities || []).forEach((act, ai) => {
    const timeVal = state[getActivityKey(day.id, ai, 'time')] || '';
    const notesVal = state[getActivityKey(day.id, ai, 'notes')] || '';
    const done = state[getActivityKey(day.id, ai, 'done')] || false;
    html += `<div class="activity-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <h3>${act.icon || '🏃'} ${act.name}</h3>
        <button class="ex-delete" onclick="deleteActivity('${day.id}',${ai})">×</button>
      </div>
      <div class="activity-row">
        <div>
          <div class="activity-label" style="margin-bottom:4px">Duur</div>
          <div class="input-group">
            <input class="activity-input" type="number" inputmode="numeric" placeholder="0"
              value="${timeVal}" onchange="logActivity('${day.id}',${ai},'time',this.value)">
            <span class="activity-label">min</span>
          </div>
        </div>
      </div>
      <textarea class="notes-input" rows="2" placeholder="Notities..."
        onchange="logActivity('${day.id}',${ai},'notes',this.value)">${notesVal}</textarea>
      <br><br>
      <button class="activity-done ${done?'checked':'unchecked'}"
        id="actdone_${day.id}_${ai}" onclick="toggleActivityDone('${day.id}',${ai})">
        ${done ? '✓ Voltooid!' : 'Markeer als voltooid'}
      </button>
    </div>`;
  });

  html += `<button class="add-exercise-btn" onclick="openAddActivity('${day.id}')">
    ➕ Activiteit toevoegen
  </button>`;
  return html;
}

// ── Tab switching ──────────────────────────────────────────────────
function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.day-view').forEach((v,i) => v.classList.toggle('active', i===idx));
  document.getElementById('archiveView').classList.remove('active');
}

function showArchive() {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.day-view').forEach(v => v.classList.remove('active'));
  const av = document.getElementById('archiveView');
  av.classList.add('active');
  renderArchive();
}

// ── Gym logging ────────────────────────────────────────────────────
function logVal(dayId, ei, si, field, val) {
  state[getKey(dayId, ei, si, field)] = val;
  saveState();
  const di = schema.findIndex(d => d.id === dayId);
  updateSummary(dayId, di);
}

function toggleDone(dayId, ei, si) {
  const key = getDoneKey(dayId, ei, si);
  state[key] = !state[key];
  saveState();
  const btn = document.getElementById(`donebtn_${dayId}_${ei}_${si}`);
  btn.classList.toggle('checked', state[key]);
  const di = schema.findIndex(d => d.id === dayId);
  updateProgress(dayId, ei, schema[di].exercises[ei].sets);
  updateSummary(dayId, di);
  if (state[key]) showToast('Set gelogd ✓');
}

function updateProgress(dayId, ei, totalSets) {
  let done = 0;
  for (let si = 0; si < totalSets; si++) {
    if (state[getDoneKey(dayId, ei, si)]) done++;
  }
  const pct = Math.round((done/totalSets)*100);
  const fill = document.getElementById(`prog_${dayId}_${ei}`);
  const count = document.getElementById(`prog_count_${dayId}_${ei}`);
  if (fill) fill.style.width = pct + '%';
  if (count) count.textContent = `${done} / ${totalSets}`;
}

function updateSummary(dayId, di) {
  const day = schema[di];
  const el = document.getElementById(`summary_${dayId}`);
  if (!el) return;
  let totalSets = 0, doneSets = 0, totalVol = 0;
  day.exercises.forEach((ex, ei) => {
    for (let si = 0; si < ex.sets; si++) {
      totalSets++;
      if (state[getDoneKey(dayId, ei, si)]) {
        doneSets++;
        const w = parseFloat(state[getKey(dayId,ei,si,'w')]) || 0;
        const r = parseInt(state[getKey(dayId,ei,si,'r')]) || 0;
        totalVol += w * r;
      }
    }
  });
  el.innerHTML = `
    <div class="summary-row"><span>Sets voltooid</span><span class="summary-val">${doneSets} / ${totalSets}</span></div>
    <div class="summary-row"><span>Totaal volume</span><span class="summary-val">${totalVol > 0 ? totalVol.toLocaleString('nl') + ' kg' : '—'}</span></div>
    <div class="summary-row"><span>Voortgang</span><span class="summary-val">${Math.round((doneSets/totalSets)*100)}%</span></div>`;
}

// ── Walk logging ───────────────────────────────────────────────────
function logWalk(dayId, field, val) {
  state[getWalkKey(dayId, field)] = val;
  saveState();
}

function toggleWalkDone(dayId) {
  const key = getWalkKey(dayId, 'done');
  state[key] = !state[key];
  saveState();
  const btn = document.getElementById(`walkdone_${dayId}`);
  btn.className = `activity-done ${state[key] ? 'checked' : 'unchecked'}`;
  btn.textContent = state[key] ? '✓ Wandeling voltooid!' : 'Markeer als voltooid';
  if (state[key]) showToast('Wandeling gelogd 🚶');
}

// ── Activity logging ───────────────────────────────────────────────
function logActivity(dayId, ai, field, val) {
  state[getActivityKey(dayId, ai, field)] = val;
  saveState();
}

function toggleActivityDone(dayId, ai) {
  const key = getActivityKey(dayId, ai, 'done');
  state[key] = !state[key];
  saveState();
  const btn = document.getElementById(`actdone_${dayId}_${ai}`);
  btn.className = `activity-done ${state[key] ? 'checked' : 'unchecked'}`;
  btn.textContent = state[key] ? '✓ Voltooid!' : 'Markeer als voltooid';
  if (state[key]) showToast('Activiteit gelogd ✓');
}

// ── Add / Delete exercises & activities ───────────────────────────
function openAddExercise(dayId) {
  currentAddDayId = dayId;
  currentAddType = 'exercise';
  document.getElementById('exName').value = '';
  document.getElementById('exTip').value = '';
  document.getElementById('exSets').value = '';
  document.getElementById('exReps').value = '';
  document.getElementById('addExModal').classList.add('open');
}

function confirmAddExercise() {
  const name = document.getElementById('exName').value.trim();
  const tip = document.getElementById('exTip').value.trim();
  const sets = parseInt(document.getElementById('exSets').value) || 3;
  const reps = document.getElementById('exReps').value.trim() || '10–12';
  if (!name) { showToast('Vul een naam in'); return; }
  const di = schema.findIndex(d => d.id === currentAddDayId);
  schema[di].exercises.push({ name, tip, sets, reps });
  saveSchema();
  closeModal('addExModal');
  buildUI();
  switchTab(di);
  showToast(`${name} toegevoegd ✓`);
}

function deleteExercise(dayId, ei) {
  if (!confirm('Oefening verwijderen?')) return;
  const di = schema.findIndex(d => d.id === dayId);
  schema[di].exercises.splice(ei, 1);
  saveSchema();
  buildUI();
  switchTab(di);
  showToast('Oefening verwijderd');
}

function openAddActivity(dayId) {
  currentAddDayId = dayId;
  currentAddType = 'activity';
  document.getElementById('actName').value = '';
  document.getElementById('actIcon').value = '';
  document.getElementById('addActivityModal').classList.add('open');
}

function confirmAddActivity() {
  const name = document.getElementById('actName').value.trim();
  const icon = document.getElementById('actIcon').value.trim() || '🏃';
  if (!name) { showToast('Vul een naam in'); return; }
  const di = schema.findIndex(d => d.id === currentAddDayId);
  if (!schema[di].activities) schema[di].activities = [];
  schema[di].activities.push({ name, icon });
  saveSchema();
  closeModal('addActivityModal');
  buildUI();
  switchTab(di);
  showToast(`${name} toegevoegd ✓`);
}

function deleteActivity(dayId, ai) {
  if (!confirm('Activiteit verwijderen?')) return;
  const di = schema.findIndex(d => d.id === dayId);
  schema[di].activities.splice(ai, 1);
  saveSchema();
  buildUI();
  switchTab(di);
  showToast('Activiteit verwijderd');
}

// ── Reset ──────────────────────────────────────────────────────────
function resetDay(dayId) {
  if (!confirm('Wil je alle data voor deze dag wissen?')) return;
  const di = schema.findIndex(d => d.id === dayId);
  const day = schema[di];
  // Clear all keys for this day in current week
  Object.keys(state).forEach(k => {
    if (k.startsWith(`${WEEK_KEY}_${dayId}_`)) delete state[k];
  });
  saveState();
  buildUI();
  switchTab(di);
  showToast('Dag gereset 🔄');
}

// ── Archive ────────────────────────────────────────────────────────
function saveWeekToArchive() {
  const archive = loadArchive();
  const weekData = {
    label: `Week van ${formatDate(weekDates[0])} t/m ${formatDate(weekDates[6])}`,
    savedAt: new Date().toISOString(),
    days: {}
  };

  schema.forEach((day, di) => {
    const dayData = { name: day.name, type: day.type, exercises: [] };
    if (day.type === 'gym') {
      day.exercises.forEach((ex, ei) => {
        const sets = [];
        for (let si = 0; si < ex.sets; si++) {
          const w = state[getKey(day.id, ei, si, 'w')] || '';
          const r = state[getKey(day.id, ei, si, 'r')] || '';
          const done = state[getDoneKey(day.id, ei, si)] || false;
          sets.push({ w, r, done });
        }
        dayData.exercises.push({ name: ex.name, sets });
      });
    } else if (day.type === 'walk') {
      dayData.dist = state[getWalkKey(day.id, 'dist')] || '';
      dayData.time = state[getWalkKey(day.id, 'time')] || '';
      dayData.notes = state[getWalkKey(day.id, 'notes')] || '';
      dayData.done = state[getWalkKey(day.id, 'done')] || false;
    }
    weekData.days[day.id] = dayData;
  });

  archive[WEEK_KEY] = weekData;
  saveArchive(archive);
  showToast('Week opgeslagen in archief 📦');
}

function renderArchive() {
  const archive = loadArchive();
  const el = document.getElementById('archiveContent');
  const weeks = Object.entries(archive).sort((a,b) => b[0].localeCompare(a[0]));

  if (weeks.length === 0) {
    el.innerHTML = `<div class="no-archive">
      <div style="font-size:40px;margin-bottom:12px">📭</div>
      <div>Nog geen weken opgeslagen.</div>
      <div style="margin-top:6px;font-size:12px">Tik op "💾 Sla week op" om te beginnen.</div>
    </div>`;
    return;
  }

  el.innerHTML = weeks.map(([key, week]) => {
    // Count completed sets
    let totalDone = 0, totalSets = 0;
    Object.values(week.days).forEach(day => {
      if (day.type === 'gym') {
        day.exercises.forEach(ex => {
          ex.sets.forEach(s => {
            totalSets++;
            if (s.done) totalDone++;
          });
        });
      }
    });

    const daysHtml = Object.entries(week.days).map(([id, day]) => {
      if (day.type === 'gym' && day.exercises.length > 0) {
        const exHtml = day.exercises.map(ex => {
          const doneSets = ex.sets.filter(s => s.done).length;
          const vol = ex.sets.reduce((acc, s) => acc + ((parseFloat(s.w)||0) * (parseInt(s.r)||0)), 0);
          return `<div class="archive-ex">• ${ex.name}: ${doneSets}/${ex.sets.length} sets${vol > 0 ? ` · ${vol.toLocaleString('nl')}kg` : ''}</div>`;
        }).join('');
        return `<div class="archive-day"><div class="archive-day-name">${day.name}</div>${exHtml}</div>`;
      } else if (day.type === 'walk' && (day.dist || day.done)) {
        return `<div class="archive-day"><div class="archive-day-name">🚶 Wandeling</div>
          <div class="archive-ex">${day.dist ? `${day.dist} km` : ''} ${day.time ? `· ${day.time} min` : ''} ${day.done ? '✓' : ''}</div></div>`;
      }
      return '';
    }).filter(Boolean).join('');

    return `<div class="archive-week">
      <div class="archive-week-header" onclick="toggleArchiveWeek('${key}')">
        <div>
          <div class="archive-week-title">📅 ${week.label}</div>
          <div class="archive-week-stats">${totalDone}/${totalSets} sets voltooid</div>
        </div>
        <span style="color:#aaa">▼</span>
      </div>
      <div class="archive-week-body" id="awb_${key}">${daysHtml}</div>
    </div>`;
  }).join('');
}

function toggleArchiveWeek(key) {
  const el = document.getElementById(`awb_${key}`);
  el.classList.toggle('open');
}

// ── Modal helpers ──────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// ── Toast ──────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Init ───────────────────────────────────────────────────────────
buildUI();
</script>
